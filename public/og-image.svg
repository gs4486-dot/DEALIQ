<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f2347"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4263eb"/>
      <stop offset="100%" stop-color="#4263eb" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4263eb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4263eb" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#ffffff" fill-opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Top blue glow -->
  <ellipse cx="600" cy="0" rx="600" ry="200" fill="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="100" y="200" width="4" height="230" rx="2" fill="#4263eb" fill-opacity="0.6"/>

  <!-- DEALIQ wordmark -->
  <text
    x="140"
    y="320"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="108"
    font-weight="800"
    letter-spacing="-2"
    fill="#ffffff"
  >DEALIQ</text>

  <!-- Blue underline accent -->
  <rect x="140" y="342" width="340" height="5" rx="2.5" fill="url(#accent-line)"/>

  <!-- Tagline -->
  <text
    x="140"
    y="400"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="28"
    font-weight="400"
    letter-spacing="0.5"
    fill="#ffffff"
    fill-opacity="0.55"
  >Institutional-Grade Deal Intelligence</text>

  <!-- Pills row -->
  <rect x="140" y="435" width="190" height="36" rx="18" fill="#ffffff" fill-opacity="0.07"/>
  <text x="235" y="459" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600" fill="#ffffff" fill-opacity="0.7" text-anchor="middle">M&amp;A Simulator</text>

  <rect x="344" y="435" width="160" height="36" rx="18" fill="#ffffff" fill-opacity="0.07"/>
  <text x="424" y="459" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600" fill="#ffffff" fill-opacity="0.7" text-anchor="middle">Deal Tracker</text>

  <rect x="518" y="435" width="160" height="36" rx="18" fill="#ffffff" fill-opacity="0.07"/>
  <text x="598" y="459" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600" fill="#ffffff" fill-opacity="0.7" text-anchor="middle">Comps Engine</text>

  <!-- Bottom attribution -->
  <text
    x="140"
    y="560"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="18"
    fill="#ffffff"
    fill-opacity="0.25"
  >Powered by Claude AI · Live Market Data</text>

  <!-- Decorative right-side chart bars -->
  <g opacity="0.12">
    <rect x="880" y="280" width="36" height="180" rx="4" fill="#4263eb"/>
    <rect x="930" y="230" width="36" height="230" rx="4" fill="#4263eb"/>
    <rect x="980" y="310" width="36" height="150" rx="4" fill="#4263eb"/>
    <rect x="1030" y="190" width="36" height="270" rx="4" fill="#4263eb"/>
    <rect x="1080" y="250" width="36" height="210" rx="4" fill="#4263eb"/>
  </g>

  <!-- Subtle bottom border -->
  <rect x="0" y="622" width="1200" height="8" rx="0" fill="#4263eb" fill-opacity="0.4"/>
</svg>
